# vim: set filetype=helm:
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "spring-boot-api.fullname" . }}
                port:
                  number: 8080
          - path: /logs
            pathType: Prefix
            backend:
              service:
                name: {{ include "spring-boot-api.fullname" . }}
                port:
                  number: 8081
          - path: /soap
            pathType: Prefix
            backend:
              service:
                name: {{ include "spring-boot-api.fullname" . }}
                port:
                  number: 8082
{{- end -}}
